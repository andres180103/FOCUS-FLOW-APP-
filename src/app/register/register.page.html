<ion-content>

<h1>Registro</h1>

<input
type="text"
placeholder="Nombre"
[(ngModel)]="nombre">

<input
type="email"
placeholder="Correo"
[(ngModel)]="email">

<input
type="password"
placeholder="Contraseña"
[(ngModel)]="password">

<button
(click)="registrar()">

Registrarse

</button>

</ion-content>
